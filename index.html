<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BikeStore</title> <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="menu">
        <div class="logo">
            BikeStore
        </div>  
      
        <ul>
            Home
            Produto
            Contato
        </ul>
    </nav>
    <section class="hero">
        <div class="texto">
            <h1>As melhores bicicletas</h1>
            <p>
                Qualidade,conforto e desempenho para vc
            </p>
            <button>
                Produto
            </button>

            <img src="vk.jpg" alt="Bicicleta">

        </div>

    </section>
    <section class="produto">
        <div class="card">
            <h2>Bike Mountain</h2>
            <p>Perfeita para trilhas.</p>
            <span>R$ 3.200</span>

        </div>
        <div class="card">
            <h2>Bike Speed</h2>
            <p>Ideal para Cidade</p>
            <span>2.600</span>
        </div>
        <div class="card">
            <h2>Bike Urban</h2>
            <p>Conforto para o dia a dia</p>
            <span>1.700</span>
        </div>
    </section>
    <footer>
        <p>
            © 2026 BikeStore
        </p>
    </footer>
</body>
</html>
